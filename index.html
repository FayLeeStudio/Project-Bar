<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Bar — 赛道进度</title>
<!-- Overlay mode: when loaded by the Tauri shell the URL carries #overlay.
     We flip the page background to transparent so the desktop shows through
     and the track floats like a desktop pet (Bongo-Cat style). In a plain
     browser (no #overlay) we keep a dark backdrop so it stays visible. -->
<script>
  if (location.hash.indexOf("overlay") !== -1) {
    document.documentElement.classList.add("overlay");
  }
</script>
<style>
  /* ----------------------------------------------------------------
     Project Bar — Stage 1 overlay (Bongo-Cat style sticker)
     8-bit / pixel aesthetic. No dependencies. Single file.
     Core idea: the track is an SVG <path>; the car is a point sitting
     at progress% along that path (getPointAtLength). Swap the path data
     later (pen shape, one-stroke drawing) and everything keeps working.
  ---------------------------------------------------------------- */

  :root {
    --bg:        #0f1021;   /* deep night (browser backdrop only) */
    --track:     #3a3f6b;   /* asphalt */
    --track-edge:#6b72b8;   /* lane edge */
    --car:       #ff4d6d;   /* player car */
    --car-edge:  #ffe1e7;   /* car outline */
    --accent:    #ffd23f;   /* checkered / highlights */
    --text:      #e8e9ff;
    --text-dim:  #8a8db5;
    --finish:    #ffffff;
    --panel:     rgba(15,16,33,.82);   /* bar / menu backdrop */
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: "Courier New", ui-monospace, monospace;
    -webkit-font-smoothing: none;
  }

  /* Overlay mode (Tauri shell): desktop shows through, no scrollbars.
     The track keeps only its own outline; the bar/menu keep a translucent
     backdrop so text stays readable on any wallpaper. */
  html.overlay, html.overlay body {
    background: transparent !important;
    overflow: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    gap: 8px;
    padding: 8px;
    min-height: 100vh;
  }

  .app {
    position: relative;
    width: 100%;
    max-width: 360px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    user-select: none;
    -webkit-user-select: none;
  }

  /* The track: just the outline, no frame. The whole svg is a drag handle. */
  .track {
    width: 100%;
    height: auto;
    display: block;
    overflow: visible;
    cursor: grab;
  }
  .track:active { cursor: grabbing; }
  .car-group { transition: transform .12s linear; }

  /* Remote players (Stage 2): one colored car + name tag per opponent.
     They reuse .car-group so motion between throttled updates stays smooth. */
  .car-label {
    font: 8px "Courier New", ui-monospace, monospace;
    fill: var(--text);
    paint-order: stroke;      /* draw a dark halo under the glyphs */
    stroke: #000;
    stroke-width: 2px;
    stroke-linejoin: round;
  }

  /* Compact info bar -------------------------------------------------- */
  .bar {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--panel);
    border: 3px solid #000;
    box-shadow: 3px 3px 0 rgba(0,0,0,.5);
    padding: 6px 6px 6px 10px;
    cursor: grab;
  }
  .bar:active { cursor: grabbing; }

  .bar-info {
    flex: 1;
    min-width: 0;
    display: flex;
    align-items: baseline;
    gap: 8px;
    font-size: 12px;
    letter-spacing: .5px;
    white-space: nowrap;
    overflow: hidden;
  }
  .bar-info .task {
    color: var(--accent);
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 48%;
  }
  .bar-info .sep { color: var(--text-dim); }
  .bar-info .pct { color: var(--text); }
  .bar-info .pct b { color: var(--accent); font-size: 14px; }
  .bar-info .lap { color: var(--text-dim); text-transform: uppercase; }
  .bar-info .lap b { color: var(--text); }
  .bar-info .room { color: var(--text-dim); }

  .menu-btn {
    flex: 0 0 auto;
    font-family: inherit;
    font-size: 15px;
    line-height: 1;
    color: #000;
    background: var(--accent);
    border: 3px solid #000;
    box-shadow: 2px 2px 0 rgba(0,0,0,.6);
    width: 32px;
    height: 28px;
    padding: 0;
    cursor: pointer;
  }
  .menu-btn:active { transform: translate(2px,2px); box-shadow: none; }

  /* Popovers float above the bar so they never overflow the small window */
  .menu, .edit-row {
    position: absolute;
    bottom: 46px;
    background: rgba(15,16,33,.94);
    border: 3px solid #000;
    box-shadow: 3px 3px 0 rgba(0,0,0,.5);
    z-index: 5;
  }
  .menu {
    right: 0;
    width: 180px;
    display: flex;
    flex-direction: column;
  }
  .menu[hidden], .edit-row[hidden] { display: none; }

  .menu-item {
    font-family: inherit;
    font-size: 12px;
    letter-spacing: .5px;
    text-align: left;
    color: var(--text);
    background: transparent;
    border: none;
    border-bottom: 1px solid rgba(255,255,255,.08);
    padding: 10px 12px;
    cursor: pointer;
  }
  .menu-item:last-child { border-bottom: none; }
  .menu-item:hover { background: rgba(255,255,255,.08); }
  .menu-item.danger { color: var(--car); }

  .edit-row {
    left: 0;
    right: 0;
    display: flex;
    gap: 6px;
    padding: 6px;
  }
  .edit-row input {
    flex: 1;
    min-width: 0;
    background: var(--bg);
    color: var(--text);
    border: 3px solid #000;
    box-shadow: inset 0 0 0 2px var(--track-edge);
    font-family: inherit;
    font-size: 13px;
    padding: 7px 9px;
  }
  .edit-row button {
    font-family: inherit;
    font-size: 12px;
    color: #000;
    background: var(--accent);
    border: 3px solid #000;
    box-shadow: 2px 2px 0 rgba(0,0,0,.6);
    padding: 0 12px;
    cursor: pointer;
  }

  input:focus-visible, button:focus-visible {
    outline: 3px solid var(--accent);
    outline-offset: 2px;
  }
  @media (prefers-reduced-motion: reduce) {
    .car-group { transition: none !important; }
  }
</style>
</head>
<body>

  <div class="app" id="app">

    <!-- TRACK ------------------------------------------------------------
         This single path IS the track (only its outline is drawn now —
         no frame, no grid). To change the track shape later, replace only
         the `d` attribute of #trackPath. Car logic reads this path and
         needs no changes.
    ------------------------------------------------------------------- -->
    <svg id="board" class="track" viewBox="0 0 320 200"
         xmlns="http://www.w3.org/2000/svg" aria-label="赛道">
      <!-- dark outline underneath: keeps the track readable on any wallpaper -->
      <path d="M 60 150 C 20 150 20 60 70 55 C 130 49 150 110 200 105 C 250 100 270 40 290 70 C 305 92 280 160 220 158 C 150 156 110 150 60 150 Z"
            fill="none" stroke="#000" stroke-width="27"
            stroke-linejoin="round" stroke-linecap="round" opacity="0.55"/>
      <!-- asphalt: the track itself -->
      <path id="trackPath"
            d="M 60 150 C 20 150 20 60 70 55 C 130 49 150 110 200 105 C 250 100 270 40 290 70 C 305 92 280 160 220 158 C 150 156 110 150 60 150 Z"
            fill="none" stroke="var(--track)" stroke-width="22"
            stroke-linejoin="round" stroke-linecap="round"/>
      <!-- dashed centre line -->
      <path d="M 60 150 C 20 150 20 60 70 55 C 130 49 150 110 200 105 C 250 100 270 40 290 70 C 305 92 280 160 220 158 C 150 156 110 150 60 150 Z"
            fill="none" stroke="var(--track-edge)" stroke-width="2"
            stroke-dasharray="2 6" opacity="0.6"/>

      <!-- start / finish marker (drawn at path start, set by JS) -->
      <g id="finishMark"></g>

      <!-- remote players' cars (Stage 2): JS creates one <g> per opponent
           here, below the local car so "you" always stay on top. -->
      <g id="remoteCars"></g>

      <!-- the car: a dot with an outline. JS moves this group. -->
      <g id="car" class="car-group">
        <circle r="7" fill="var(--car)" stroke="#000" stroke-width="3"/>
        <circle r="7" fill="none" stroke="var(--car-edge)" stroke-width="1.5"/>
      </g>
    </svg>

    <!-- COMPACT BAR ------------------------------------------------------ -->
    <div class="bar" id="bar">
      <div class="bar-info">
        <span class="task" id="taskLabel">本圈任务</span>
        <span class="sep">·</span>
        <span class="pct"><b id="pctText">0</b>%</span>
        <span class="sep">·</span>
        <span class="lap">Lap <b id="lapText">0</b></span>
        <span class="sep" id="roomSep" hidden>·</span>
        <span class="room" id="roomText"></span>
      </div>
      <button class="menu-btn" id="menuBtn" data-no-drag
              aria-label="菜单" aria-haspopup="true">≡</button>
    </div>

    <!-- MENU (hidden until ≡) -------------------------------------------- -->
    <div class="menu" id="menu" data-no-drag hidden>
      <button class="menu-item" id="editBtn">✎ 编辑任务</button>
      <button class="menu-item" id="nameBtn">🏷 改昵称</button>
      <button class="menu-item" id="newRoomBtn" hidden>✨ 新建房间</button>
      <button class="menu-item" id="joinRoomBtn" hidden>🚪 加入房间…</button>
      <button class="menu-item" id="copyLinkBtn" hidden>🔗 复制房间链接</button>
      <button class="menu-item danger" id="closeBtn">✕ 关闭程序</button>
    </div>

    <!-- INLINE TASK EDITOR (opened from menu) ---------------------------- -->
    <div class="edit-row" id="editRow" data-no-drag hidden>
      <input id="taskInput" type="text" maxlength="40"
             placeholder="在比什么…" aria-label="任务名称">
      <button id="saveBtn">OK</button>
    </div>

  </div>

<script>
(function () {
  "use strict";

  const $ = function (id) { return document.getElementById(id); };

  const app        = $("app");
  const path       = $("trackPath");
  const car        = $("car");
  const finishMark = $("finishMark");
  const pctText    = $("pctText");
  const lapText    = $("lapText");
  const taskLabel  = $("taskLabel");
  const menuBtn    = $("menuBtn");
  const menu       = $("menu");
  const editBtn    = $("editBtn");
  const closeBtn   = $("closeBtn");
  const editRow    = $("editRow");
  const taskInput  = $("taskInput");
  const saveBtn    = $("saveBtn");
  const nameBtn    = $("nameBtn");
  const roomText   = $("roomText");
  const roomSep    = $("roomSep");
  const newRoomBtn = $("newRoomBtn");
  const joinRoomBtn= $("joinRoomBtn");
  const copyLinkBtn= $("copyLinkBtn");

  // Tauri APIs exist only inside the shell (withGlobalTauri + remote
  // capability). Guarded so the page still runs standalone in a browser.
  const TW        = window.__TAURI__ && window.__TAURI__.window;
  const TE        = window.__TAURI__ && window.__TAURI__.event;
  const appWindow = TW ? TW.getCurrentWindow() : null;

  // --- state ---
  // Stage 2 will sync an array of these (one per player). Progress is driven
  // by the Rust keycount in Stage B (keystrokes + mouse clicks).
  const STORE_KEY = "projectbar.task";

  // One lap = this many inputs. Static preset for now; adjustable later via
  // this localStorage key (a settings UI comes later).
  const PER_LAP = Number(localStorage.getItem("projectbar.perlap")) || 100;

  const state = {
    count: 0,
    progress: 0,
    laps: 0,
    task: localStorage.getItem(STORE_KEY) || ""
  };

  // total length of the track path — the bridge between % and position
  const totalLen = path.getTotalLength();

  // small checkered start/finish marker at the path origin
  function drawFinish() {
    const p0 = path.getPointAtLength(0);
    const s = 4;
    let squares = "";
    for (let i = 0; i < 4; i++) {
      const fill = (i % 2 === 0) ? "var(--finish)" : "#000";
      squares += '<rect x="' + (p0.x - s + (i % 2) * s) + '" y="' +
                 (p0.y - s + Math.floor(i / 2) * s) +
                 '" width="' + s + '" height="' + s + '" fill="' + fill + '"/>';
    }
    finishMark.innerHTML = squares;
  }

  // move the car to progress (0..100) along the path
  function render() {
    const pct = Math.max(0, Math.min(100, state.progress));
    const pt = path.getPointAtLength((pct / 100) * totalLen);
    car.setAttribute("transform", "translate(" + pt.x + ", " + pt.y + ")");
    pctText.textContent = Math.round(pct);
    lapText.textContent = state.laps;
    taskLabel.textContent = state.task.trim() || "本圈任务";
  }

  // --- Stage 2 · multiplayer room (Cloudflare Workers + Durable Objects) ----
  // The backend only relays integer `ticks` (CLAUDE.md §4 / Design §8). Your
  // own car is still driven instantly by the keycount above; opponents' cars
  // come from the room's broadcast state. Both are placed only via
  // path.getPointAtLength — multiplayer never touches the car/progress math.
  const SVGNS = "http://www.w3.org/2000/svg";
  const PROGRESS_INTERVAL_MS = 100; // 10fps report throttle (the one knob)

  const params = new URLSearchParams(location.search);

  // Room code: short, human-readable, no ambiguous chars. Players share the
  // code (like a Jackbox / Among-Us room) — there is no directory to browse,
  // joining = entering the exact code.
  const CODE_ALPHABET = "ABCDEFGHJKMNPQRSTUVWXYZ23456789"; // dropped I L O 0 1
  function makeRoomCode() {
    let s = "";
    for (let i = 0; i < 4; i++) s += CODE_ALPHABET[Math.floor(Math.random() * CODE_ALPHABET.length)];
    return s;
  }
  function normRoom(s) {
    return String(s || "").trim().toUpperCase().replace(/[^A-Z0-9]/g, "").slice(0, 12);
  }

  // Source of truth = localStorage, so the room survives restarts AND works in
  // the fixed-URL Tauri shell (the native side never has to inject a roomId).
  // A `?room=` link still wins on first load, so share links just work.
  let roomId = normRoom(params.get("room")) ||
               normRoom(localStorage.getItem("projectbar.room")) ||
               makeRoomCode();
  localStorage.setItem("projectbar.room", roomId);

  // Bring our own connection id: the Worker reads ?_pk as the connection id, so
  // we can recognise (and skip) our own car in the broadcast without server help.
  const myId = (window.crypto && crypto.randomUUID)
    ? crypto.randomUUID()
    : (Date.now().toString(36) + Math.random().toString(36).slice(2));

  let playerName = localStorage.getItem("projectbar.name") || ("玩家-" + myId.slice(0, 4));

  // Backend host. Local `wrangler dev` listens on 127.0.0.1:8787; in production
  // this is your Cloudflare Workers subdomain (filled in after `wrangler deploy`).
  // Override at runtime via localStorage 'projectbar.partyhost'.
  const PROD_HOST = "project-bar.rectrepair.workers.dev"; // Cloudflare Workers backend
  const isDev = location.protocol === "file:" ||
                location.hostname === "localhost" ||
                location.hostname === "127.0.0.1";
  // ?host= wins (handy for pointing a locally-served page at the cloud backend),
  // then a localStorage override, then dev/prod defaults.
  const PARTY_HOST = params.get("host") ||
                     localStorage.getItem("projectbar.partyhost") ||
                     (isDev ? "127.0.0.1:8787" : PROD_HOST);
  const wsProto = /^(localhost|127\.0\.0\.1)/.test(PARTY_HOST) ? "ws" : "wss";

  // Only dial in when multiplayer is actually intended, so a plain single-player
  // page (no room, no configured backend) stays silent and Stage-1 identical.
  const multiplayerEnabled =
    params.has("room") || params.has("host") || isDev ||
    !!localStorage.getItem("projectbar.partyhost") ||
    PROD_HOST.indexOf("CF_SUBDOMAIN") === -1;

  const remoteLayer = $("remoteCars");
  const remoteEls = Object.create(null); // id -> { g, label }

  // stable per-player colour from the connection id
  function colorFor(id) {
    let h = 0;
    for (let i = 0; i < id.length; i++) h = (h * 31 + id.charCodeAt(i)) >>> 0;
    return "hsl(" + (h % 360) + ", 75%, 62%)";
  }

  // place any car <g> at ticks (0..100) — the SAME bridge render() uses
  function placeCar(g, ticks) {
    const pct = Math.max(0, Math.min(100, Number(ticks) || 0));
    const pt = path.getPointAtLength((pct / 100) * totalLen);
    g.setAttribute("transform", "translate(" + pt.x + ", " + pt.y + ")");
  }

  function renderRemote(players) {
    const seen = Object.create(null);
    for (const id in players) {
      if (id === myId) continue; // our own car is driven locally
      seen[id] = true;
      let el = remoteEls[id];
      if (!el) {
        const g = document.createElementNS(SVGNS, "g");
        g.setAttribute("class", "car-group");
        const dot = document.createElementNS(SVGNS, "circle");
        dot.setAttribute("r", "6");
        dot.setAttribute("fill", colorFor(id));
        dot.setAttribute("stroke", "#000");
        dot.setAttribute("stroke-width", "3");
        const label = document.createElementNS(SVGNS, "text");
        label.setAttribute("class", "car-label");
        label.setAttribute("y", "-10");
        label.setAttribute("text-anchor", "middle");
        g.appendChild(dot);
        g.appendChild(label);
        remoteLayer.appendChild(g);
        el = remoteEls[id] = { g: g, label: label };
      }
      el.label.textContent = players[id].name || "";
      placeCar(el.g, players[id].ticks);
    }
    // drop cars for players who left
    for (const id in remoteEls) {
      if (!seen[id]) { remoteEls[id].g.remove(); delete remoteEls[id]; }
    }
  }

  let ws = null;
  let pendingTicks = null;     // latest progress waiting to be reported
  let reconnectTimer = null;

  function sendJoin() {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: "join", name: playerName }));
      pendingTicks = Math.round(state.progress); // sync current progress on entry
    }
  }

  function onWsMessage(e) {
    let data;
    try { data = JSON.parse(e.data); } catch (_) { return; }
    if (data && data.type === "state") renderRemote(data.players || {});
  }

  function scheduleReconnect() {
    ws = null;
    if (reconnectTimer) return;
    reconnectTimer = setTimeout(function () { reconnectTimer = null; connect(); }, 2000);
  }

  function connect() {
    if (!multiplayerEnabled) return;
    if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
    let socket;
    try {
      socket = new WebSocket(
        wsProto + "://" + PARTY_HOST + "/parties/main/" +
        encodeURIComponent(roomId) + "?_pk=" + encodeURIComponent(myId)
      );
    } catch (_) { return; } // bad host: stay single-player
    ws = socket;
    socket.onopen = sendJoin;
    socket.onmessage = onWsMessage;
    socket.onclose = scheduleReconnect; // auto-reconnect (incl. partykit dev restarts)
    socket.onerror = function () {};     // an error is followed by close → reconnect
  }

  function reconnect() {
    if (!multiplayerEnabled) return;
    if (ws) { ws.onclose = null; try { ws.close(); } catch (_) {} ws = null; }
    if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
    connect();
  }

  // Leave the current room and join `code` — no page reload, so it works the
  // same in a browser and inside the fixed-URL Tauri shell.
  function switchRoom(code) {
    const r = normRoom(code);
    if (!r || r === roomId) return;
    roomId = r;
    localStorage.setItem("projectbar.room", roomId);
    roomText.textContent = "#" + roomId;
    for (const id in remoteEls) { remoteEls[id].g.remove(); delete remoteEls[id]; }
    reconnect();
  }
  function newRoom() {
    let c; do { c = makeRoomCode(); } while (c === roomId);
    switchRoom(c);
  }
  function shareLink() {
    const u = new URL(location.href);
    u.searchParams.set("room", roomId);
    return u.toString(); // keeps an existing #overlay hash for the Tauri shell
  }
  function copyText(t) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(t).catch(function () { fallbackCopy(t); });
    } else { fallbackCopy(t); }
  }
  function fallbackCopy(t) {
    const ta = document.createElement("textarea");
    ta.value = t; ta.style.position = "fixed"; ta.style.opacity = "0";
    document.body.appendChild(ta); ta.focus(); ta.select();
    try { document.execCommand("copy"); } catch (_) {}
    ta.remove();
  }

  if (multiplayerEnabled) {
    setInterval(function () {
      if (pendingTicks !== null && ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: "progress", ticks: pendingTicks }));
        pendingTicks = null;
      }
    }, PROGRESS_INTERVAL_MS);
    roomText.textContent = "#" + roomId;
    roomSep.hidden = false;

    // room controls live in the menu (browser + Tauri shell, identical)
    newRoomBtn.hidden = false;
    joinRoomBtn.hidden = false;
    copyLinkBtn.hidden = false;
    newRoomBtn.addEventListener("click", function () { closeMenu(); newRoom(); });
    joinRoomBtn.addEventListener("click", function () { openEdit("room"); });
    copyLinkBtn.addEventListener("click", function () {
      copyText(shareLink());
      const old = copyLinkBtn.textContent;
      copyLinkBtn.textContent = "✓ 已复制";
      setTimeout(function () { copyLinkBtn.textContent = old; }, 1200);
    });
  }

  // --- live input count from the Rust shell (Stage B) ---
  // The shell only ever sends a running total; it never records which keys.
  function applyCount(count) {
    state.count = count;
    state.laps = Math.floor(count / PER_LAP);
    state.progress = (count % PER_LAP) / PER_LAP * 100;
    render();
    // report in-lap progress as 0..100, decoupled from the local PER_LAP so the
    // backend (and other clients) never need to know our lap length.
    pendingTicks = Math.round(state.progress);
  }
  if (TE) {
    TE.listen("keycount", function (e) { applyCount(e.payload); });
  }

  // --- menu ---
  function closeMenu() { menu.hidden = true; }
  menuBtn.addEventListener("click", function (e) {
    e.stopPropagation();
    menu.hidden = !menu.hidden;
  });
  document.addEventListener("click", function (e) {
    if (!menu.hidden && !menu.contains(e.target) && e.target !== menuBtn) {
      closeMenu();
    }
  });

  // --- edit task / nickname (shared inline editor) ---
  let editMode = "task"; // 'task' | 'name'
  function openEdit(mode) {
    editMode = mode;
    closeMenu();
    editRow.hidden = false;
    if (mode === "name") {
      taskInput.value = playerName;
      taskInput.placeholder = "你的昵称…";
      taskInput.maxLength = 16;
    } else if (mode === "room") {
      taskInput.value = roomId;
      taskInput.placeholder = "输入房间号加入…";
      taskInput.maxLength = 12;
    } else {
      taskInput.value = state.task;
      taskInput.placeholder = "在比什么…";
      taskInput.maxLength = 40;
    }
    taskInput.focus();
    taskInput.select();
  }
  function saveEdit() {
    const v = taskInput.value.trim();
    if (editMode === "name") {
      if (v) {
        playerName = v;
        localStorage.setItem("projectbar.name", playerName);
        reconnect(); // rejoin under the new nickname
      }
    } else if (editMode === "room") {
      switchRoom(v); // join the room the player typed
    } else {
      state.task = v;
      localStorage.setItem(STORE_KEY, state.task);
    }
    editRow.hidden = true;
    render();
  }
  editBtn.addEventListener("click", function () { openEdit("task"); });
  nameBtn.addEventListener("click", function () { openEdit("name"); });
  saveBtn.addEventListener("click", saveEdit);
  taskInput.addEventListener("keydown", function (e) {
    if (e.key === "Enter") saveEdit();
    else if (e.key === "Escape") editRow.hidden = true;
  });

  // --- close program ---
  closeBtn.addEventListener("click", function () {
    closeMenu();
    if (appWindow) appWindow.close();
    else window.close();
  });

  // --- drag to move the window ---
  // Grab the track or the bar's empty space; buttons/menus opt out via
  // [data-no-drag] so clicks still register.
  app.addEventListener("pointerdown", function (e) {
    if (e.button !== 0) return;
    if (e.target.closest("[data-no-drag]")) return;
    if (appWindow) appWindow.startDragging();
  });

  // --- dev-only input simulator (browser testing) -------------------------
  // The real progress source is the Rust shell's keycount (global, via rdev).
  // A plain browser has none, so `?sim` lets you drive YOUR OWN car with the
  // page's own focused keyboard/clicks — purely a test stub for two-tab racing,
  // never the production input path, and off whenever the Tauri shell is present.
  if (params.has("sim") && !TE) {
    let simCount = state.count;
    const bump = function () { applyCount(++simCount); };
    const MODS = { Tab: 1, Shift: 1, Control: 1, Alt: 1, Meta: 1, CapsLock: 1 };
    document.addEventListener("keydown", function (e) {
      if (e.target.closest("input, textarea, button")) return; // ignore while typing
      if (MODS[e.key]) return;
      bump();
    });
    app.addEventListener("click", function (e) {
      if (e.target.closest("[data-no-drag]")) return;          // let buttons work
      bump();
    });
  }

  // --- init ---
  drawFinish();
  render();
  connect();
})();
</script>
</body>
</html>
