<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Bar — 赛道进度</title>
<!-- Overlay mode: when loaded by the Tauri shell the URL carries #overlay.
     We flip the page background to transparent so the desktop shows through.
     In a plain browser (no #overlay) the deep-night theme is kept intact,
     so the UI still runs standalone (architecture invariant #2). -->
<script>
  if (location.hash.indexOf("overlay") !== -1) {
    document.documentElement.classList.add("overlay");
  }
</script>
<style>
  /* ----------------------------------------------------------------
     Project Bar — Stage 1 (local, single player)
     8-bit / pixel aesthetic. No dependencies. Single file.
     Core idea: a track is an SVG <path>; the car is a point sitting
     at progress% along that path (getPointAtLength). Swap the path
     data later (pen shape, one-stroke drawing) and everything else
     keeps working unchanged.
  ---------------------------------------------------------------- */

  :root {
    --bg:        #0f1021;   /* deep night */
    --bg-2:      #1a1c3a;   /* panel */
    --track:     #3a3f6b;   /* asphalt */
    --track-edge:#6b72b8;   /* lane edge */
    --grid:      #21244a;
    --car:       #ff4d6d;   /* player car */
    --car-edge:  #ffe1e7;   /* car outline */
    --accent:    #ffd23f;   /* checkered / highlights */
    --text:      #e8e9ff;
    --text-dim:  #8a8db5;
    --finish:    #ffffff;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    min-height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: "Courier New", ui-monospace, monospace;
    -webkit-font-smoothing: none;
  }

  /* Overlay mode (Tauri shell): desktop shows through. The track stage and
     control panel keep their own opaque card backgrounds, so they float as
     a "sticker" while the gaps around them become transparent. */
  html.overlay, html.overlay body { background: transparent !important; }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 48px;
    gap: 20px;
  }

  /* Pixel-style title */
  .title {
    text-align: center;
    line-height: 1.1;
  }
  .title h1 {
    margin: 0;
    font-size: clamp(20px, 5vw, 34px);
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    text-shadow: 3px 3px 0 #000, 0 0 0 #000;
  }
  .title p {
    margin: 6px 0 0;
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  /* Track stage */
  .stage {
    width: 100%;
    max-width: 640px;
    background: var(--bg-2);
    border: 4px solid #000;
    box-shadow: 0 0 0 4px var(--grid), 8px 8px 0 rgba(0,0,0,.5);
    padding: 16px;
    image-rendering: pixelated;
  }

  svg { width: 100%; height: auto; display: block; }

  /* checkered grid backdrop inside the svg via CSS not needed; done in SVG */

  /* Controls panel */
  .panel {
    width: 100%;
    max-width: 640px;
    background: var(--bg-2);
    border: 4px solid #000;
    box-shadow: 8px 8px 0 rgba(0,0,0,.5);
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .readout {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
  }
  .readout .pct {
    font-size: clamp(36px, 10vw, 56px);
    color: var(--accent);
    letter-spacing: 2px;
    text-shadow: 3px 3px 0 #000;
  }
  .readout .laps {
    font-size: 13px;
    letter-spacing: 1px;
    color: var(--text-dim);
    text-transform: uppercase;
    text-align: right;
  }
  .readout .laps b { color: var(--text); }

  /* Pixel slider */
  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 18px;
    background: var(--track);
    border: 3px solid #000;
    box-shadow: inset 0 0 0 2px var(--track-edge);
    cursor: pointer;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 22px;
    height: 22px;
    background: var(--car);
    border: 3px solid #000;
    box-shadow: inset 0 0 0 2px var(--car-edge);
    margin-top: 0;
  }
  input[type="range"]::-moz-range-thumb {
    width: 22px;
    height: 22px;
    background: var(--car);
    border: 3px solid #000;
    box-shadow: inset 0 0 0 2px var(--car-edge);
    border-radius: 0;
  }

  .row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
  }
  .row label {
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--text-dim);
    text-transform: uppercase;
    width: 100%;
  }

  .num-input {
    flex: 1 1 120px;
    background: var(--bg);
    color: var(--text);
    border: 3px solid #000;
    box-shadow: inset 0 0 0 2px var(--track-edge);
    font-family: inherit;
    font-size: 16px;
    padding: 10px 12px;
    min-width: 0;
  }

  button {
    font-family: inherit;
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #000;
    background: var(--accent);
    border: 3px solid #000;
    box-shadow: 4px 4px 0 rgba(0,0,0,.6);
    padding: 10px 16px;
    cursor: pointer;
  }
  button:active { transform: translate(2px,2px); box-shadow: 2px 2px 0 rgba(0,0,0,.6); }
  button.ghost { background: var(--bg); color: var(--text); }

  .hint {
    font-size: 11px;
    line-height: 1.6;
    color: var(--text-dim);
    letter-spacing: .5px;
  }

  /* Accessibility: visible focus */
  input:focus-visible, button:focus-visible {
    outline: 3px solid var(--accent);
    outline-offset: 2px;
  }

  @media (prefers-reduced-motion: reduce) {
    .car-group { transition: none !important; }
  }
</style>
</head>
<body>

  <div class="title">
    <h1>Project&nbsp;Bar</h1>
    <p>Progress, but it's a racetrack</p>
  </div>

  <div class="stage">
    <svg id="board" viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg" aria-label="赛道">
      <!-- pixel grid backdrop -->
      <defs>
        <pattern id="grid" width="16" height="16" patternUnits="userSpaceOnUse">
          <path d="M16 0 L0 0 0 16" fill="none" stroke="var(--grid)" stroke-width="1"/>
        </pattern>
      </defs>
      <rect x="0" y="0" width="320" height="200" fill="url(#grid)"/>

      <!-- TRACK PATH ------------------------------------------------
           This single path IS the track. Stage 1 = a wobbly loop.
           To change the track shape later, replace only the `d`
           attribute of #trackPath (e.g. a pen, a heart, a one-stroke
           drawing). Car logic reads this path and needs no changes.
      ------------------------------------------------------------- -->
      <!-- asphalt: thick stroke -->
      <path id="trackPath"
            d="M 60 150 C 20 150 20 60 70 55 C 130 49 150 110 200 105 C 250 100 270 40 290 70 C 305 92 280 160 220 158 C 150 156 110 150 60 150 Z"
            fill="none"
            stroke="var(--track)"
            stroke-width="22"
            stroke-linejoin="round"
            stroke-linecap="round"/>
      <!-- lane edges: thin lighter stroke on top -->
      <use href="#trackPath" stroke="var(--track-edge)" stroke-width="22" fill="none" opacity="0" />
      <path d="M 60 150 C 20 150 20 60 70 55 C 130 49 150 110 200 105 C 250 100 270 40 290 70 C 305 92 280 160 220 158 C 150 156 110 150 60 150 Z"
            fill="none" stroke="var(--track-edge)" stroke-width="2" stroke-dasharray="2 6" opacity="0.5"/>

      <!-- start / finish marker (drawn at path start point, set by JS) -->
      <g id="finishMark"></g>

      <!-- the car: a dot with an outline. JS moves this group. -->
      <g id="car" class="car-group">
        <circle r="7" fill="var(--car)" stroke="#000" stroke-width="3"/>
        <circle r="7" fill="none" stroke="var(--car-edge)" stroke-width="1.5"/>
      </g>
    </svg>
  </div>

  <div class="panel">
    <div class="readout">
      <div class="pct"><span id="pctText">0</span>%</div>
      <div class="laps">
        Lap <b id="lapText">0</b><br>
        <span id="taskLabel">本圈任务</span>
      </div>
    </div>

    <input id="slider" type="range" min="0" max="100" value="0" step="1"
           aria-label="进度百分比">

    <div class="row">
      <label for="taskName">这一圈在比什么</label>
      <input id="taskName" class="num-input" type="text"
             placeholder="例如：读完这本书 / 写完报告" value="">
    </div>

    <div class="row">
      <button id="resetBtn" class="ghost">回到起点</button>
      <button id="lapBtn">完成一圈 +1</button>
    </div>

    <p class="hint">
      拖动滑块 = 让车沿赛道前进。100% = 跑完一圈。<br>
      阶段 1：本地单人。进度只存在这个页面里，刷新会清零。
    </p>
  </div>

<script>
(function () {
  "use strict";

  // --- element refs ---
  const svg       = document.getElementById("board");
  const path      = document.getElementById("trackPath");
  const car       = document.getElementById("car");
  const slider    = document.getElementById("slider");
  const pctText   = document.getElementById("pctText");
  const lapText   = document.getElementById("lapText");
  const finishMark= document.getElementById("finishMark");
  const resetBtn  = document.getElementById("resetBtn");
  const lapBtn    = document.getElementById("lapBtn");
  const taskName  = document.getElementById("taskName");
  const taskLabel = document.getElementById("taskLabel");

  // --- state ---
  // The entire app state is this object. Stage 2 will sync an array
  // of these (one per player) instead of a single local one.
  const state = {
    progress: 0,   // 0..100 within the current lap
    laps: 0        // completed laps
  };

  // total length of the track path — the bridge between % and position
  const totalLen = path.getTotalLength();

  // place a small checkered start/finish marker at the path's origin
  function drawFinish() {
    const p0 = path.getPointAtLength(0);
    // 4 tiny squares = checkered flag vibe
    const s = 4;
    let squares = "";
    for (let i = 0; i < 4; i++) {
      const fill = (i % 2 === 0) ? "var(--finish)" : "#000";
      squares += `<rect x="${p0.x - s + (i%2)*s}" y="${p0.y - s + Math.floor(i/2)*s}" width="${s}" height="${s}" fill="${fill}"/>`;
    }
    finishMark.innerHTML = squares;
  }

  // move the car to a given progress (0..100) along the path
  function render() {
    const pct = Math.max(0, Math.min(100, state.progress));
    const pt  = path.getPointAtLength((pct / 100) * totalLen);
    car.setAttribute("transform", `translate(${pt.x}, ${pt.y})`);
    pctText.textContent = Math.round(pct);
    lapText.textContent = state.laps;
  }

  // --- events ---
  slider.addEventListener("input", function () {
    state.progress = Number(slider.value);
    render();
  });

  resetBtn.addEventListener("click", function () {
    state.progress = 0;
    slider.value = 0;
    render();
  });

  lapBtn.addEventListener("click", function () {
    state.laps += 1;
    state.progress = 0;
    slider.value = 0;
    render();
  });

  taskName.addEventListener("input", function () {
    taskLabel.textContent = taskName.value.trim() || "本圈任务";
  });

  // --- init ---
  drawFinish();
  render();
})();
</script>
</body>
</html>
